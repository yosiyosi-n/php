<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>練習問題２</title>
    <link rel="stylesheet" href="css/reset/reset4.css" />
    <link rel="stylesheet" href="css/style/style4.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

</head>
<body>
    <div class="card">
        <div class="card__img">
            <img src="img/elephant.png" alt="" />
        </div>
        <div class="card__content">
            <h2 class="card__content-ttl">カードのタイトルがここに入ります。</h2>
            <p class="card__content-tag">#プログラミング</p>
            <p class="card__content-tag  card__content-tag--red">＃スクール</p>
            <!--＃プログラミングと同じ行にある＃スクールという意味-->
        </div>
    </div>
